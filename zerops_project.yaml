project:
  name: SpartanTournaments
  corePackage: LIGHT
  tags:
    - spartan
    - production
  envIsolation: none
  sshIsolation: vpn
  sharedIpv4: true
services:
  - hostname: ssr
    type: alpine/nodejs@22
    enableSubdomainAccess: true
    minContainers: 1
    maxContainers: 1
  - hostname: db
    type: postgresql:single@16
    mode: NON_HA
